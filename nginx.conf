# ---- HTTP: serve ACME challenge, redirect everything else to HTTPS ----
server {
    listen 80;
    server_name jobs.yuejiang.net;

    # Let's Encrypt validation (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: the real server ----
server {
    listen 443 ssl;
    server_name jobs.yuejiang.net;

    ssl_certificate     /etc/letsencrypt/live/jobs.yuejiang.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobs.yuejiang.net/privkey.pem;

    # ---- 1. Serve React static files ----
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---- 2. Proxy API requests to the backend ----
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}